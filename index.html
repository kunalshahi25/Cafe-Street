<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cafe Street</title>
    <link rel="shortcut icon" href="./assets/images/logo_coffe.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>


    <header>
        <div class="container">
            <img class="image-beans" src="./assets/images/bg_img_hero-coffe-beans.svg" alt="coffee">
            <nav class="navbar">
                <div class="logo">
                    <img src="./assets/images/logo_coffe.svg" alt="logo coffee">
                </div>

                <ul class="nav-links">
                    <li class="li-color">About us</li>
                    <li>Our Product</li>
                    <li>Delivery</li>
                </ul>

                <div class="nav-right">
                    <div class="search-box">
                        <input type="text" placeholder="Cappuccino">
                        <img src="./assets/images/Search-Vector.jpg" class="search-icon">
                    </div>
                    <img src="./assets/images/icons_cart.svg" class="cart-icon">
                </div>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="container">
            <div class="section-div1">

                <div class="sec-1-div1">
                    <h1>Enjoy Your <span>coffee</span> before your activity</h1>
                    <p >
                        Boost your productivity and build your mood with a glass of coffee in the morning
                    </p>
                    <div class="div-btn-link">
                        <button>
                            Order now
                        </button>
                        <img src="./assets/images/cart-orange-bg.svg" alt="cart">
                        <a href="#">More menu</a>
                    </div>
                </div>
                <div class="sec-1-div2">
                    <img src="./assets/images/img-hero.svg" alt="" width="526px" height="416px">
                </div>
            </div>
        </div>
    </main>
